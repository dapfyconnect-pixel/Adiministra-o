<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAPfy Admin | Controle do Ecossistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00ff88;
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding: 20px; display: flex; justify-content: center; }

        .admin-container { width: 100%; max-width: 600px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        header h1 { font-size: 1.2rem; }
        header span { color: var(--primary); }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-card small { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card div { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: 5px; }

        /* Lojistas List */
        .lojista-card { 
            background: var(--card-bg); 
            border-radius: 22px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            margin-bottom: 15px; 
            transition: 0.3s;
        }

        .lojista-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .lojista-info { display: flex; align-items: center; gap: 15px; }
        .lojista-icon { width: 45px; height: 45px; background: rgba(0, 255, 136, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.2rem; border: 1px solid rgba(0, 255, 136, 0.2); }
        
        .status-badge { font-size: 0.6rem; padding: 5px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .status-ativo { background: rgba(0, 255, 136, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .status-bloqueado { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .lojista-data { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .data-item { display: flex; flex-direction: column; }
        .data-item small { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .data-item b { font-size: 0.9rem; }

        /* Botões */
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-block { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-unblock { background: rgba(0, 255, 136, 0.15); color: var(--primary); border: 1px solid var(--primary); }
        .btn-block:hover { background: var(--danger); color: white; }
        .btn-unblock:hover { background: var(--primary); color: black; }

        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1><i class="fa-solid fa-crown"></i> DAPfy <span>Admin</span></h1>
        <div id="count-active" style="font-size: 0.8rem; color: var(--text-dim);">Carregando...</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Lojistas</small>
            <div id="stat-lojistas">0</div>
        </div>
        <div class="stat-card">
            <small>Transações Rede</small>
            <div id="stat-transacoes">0</div>
        </div>
    </div>

    <div id="lista-lojistas">
        <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Sincronizando dados...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7SbPIwTdTdxpuDHeV0onKi88XFLmdYyw",
      authDomain: "dapfycashback-92583.firebaseapp.com",
      projectId: "dapfycashback-92583",
      storageBucket: "dapfycashback-92583.firebasestorage.app",
      messagingSenderId: "1041877443665",
      appId: "1:1041877443665:web:0792707a9f1abe28c80470"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Monitoramento Global em Tempo Real
    onSnapshot(collection(db, "lojistas"), (snapshot) => {
        let totalTrans = 0;
        let ativos = 0;
        let html = "";

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            const status = data.status || 'ativo';
            const trans = data.registros ? data.registros.length : 0;
            const ofertas = data.ofertas ? data.ofertas.length : 0;

            totalTrans += trans;
            if(status === 'ativo') ativos++;

            html += `
                <div class="lojista-card">
                    <div class="lojista-header">
                        <div class="lojista-info">
                            <div class="lojista-icon"><i class="fa-solid ${data.icone || 'fa-store'}"></i></div>
                            <div>
                                <h3 style="font-size:1rem">${data.nomeLoja}</h3>
                                <small style="color:var(--text-dim)">ID: ${id.substring(0,8)}</small>
                            </div>
                        </div>
                        <span class="status-badge status-${status}">${status}</span>
                    </div>

                    <div class="lojista-data">
                        <div class="data-item">
                            <small>Transações</small>
                            <b>${trans}</b>
                        </div>
                        <div class="data-item">
                            <small>Promoções</small>
                            <b>${ofertas}</b>
                        </div>
                    </div>

                    <button class="btn-action ${status === 'ativo' ? 'btn-block' : 'btn-unblock'}" 
                            onclick="alterarStatus('${id}', '${status}')">
                        ${status === 'ativo' ? '<i class="fa-solid fa-lock"></i> Bloquear Acesso' : '<i class="fa-solid fa-lock-open"></i> Desbloquear'}
                    </button>
                </div>
            `;
        });

        document.getElementById('lista-lojistas').innerHTML = html || '<p style="text-align:center">Nenhum lojista cadastrado.</p>';
        document.getElementById('stat-lojistas').innerText = snapshot.size;
        document.getElementById('stat-transacoes').innerText = totalTrans;
        document.getElementById('count-active').innerText = ativos + " Lojistas Ativos";
    });

    // Função para Bloquear/Desbloquear
    window.alterarStatus = async (uid, statusAtual) => {
        const novoStatus = statusAtual === 'ativo' ? 'bloqueado' : 'ativo';
        const msg = novoStatus === 'bloqueado' ? 
            "Deseja realmente BLOQUEAR esta loja? O lojista será desconectado imediatamente." : 
            "Deseja REATIVAR o acesso desta loja?";

        if(confirm(msg)) {
            try {
                const lojistaRef = doc(db, "lojistas", uid);
                await updateDoc(lojistaRef, {
                    status: novoStatus
                });
            } catch (error) {
                console.error("Erro ao atualizar status:", error);
                alert("Erro ao processar comando.");
            }
        }
    };
</script>

</body>
</html>
